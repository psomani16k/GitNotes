syntax = "proto3";
package clone;

// [RINF:DART-SIGNAL]
message ClonePublic {
  string directoryPath = 1;
  string repoUrl = 2;
}

// [RINF:RUST-SIGNAL]
message CloneCallback {
  CloneResult status = 1;
  string repoPath = 2;
  string failReason = 3;
}

enum CloneResult{
    Success = 0;
    Fail = 1;
}
