syntax = "proto3";
package git_actions;

enum CallBackStatus{
    Success = 0;
    Fail = 1;
}
// [RINF:DART-SIGNAL]
message GitClone{
    string url = 1;
    string dir_path = 2;
    string password = 3;
    string user = 4;
}
// [RINF:RUST-SIGNAL]
message GitCloneCallback{
    CallBackStatus status = 1;
    string message = 2;
}
